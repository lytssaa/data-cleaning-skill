<svg viewBox="0 0 680 280" width="680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 2L7 5L2 8" fill="none" stroke="#888780" stroke-width="1.2" stroke-linecap="round"/>
    </marker>
  </defs>

  <text x="340" y="30" text-anchor="middle" style="font:500 15px sans-serif" fill="#2C2C2A">数据清洗管道架构</text>

  <rect x="40" y="50" width="192" height="80" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
  <text x="52" y="70" style="font:500 11px sans-serif" fill="#0C447C">Phase 0</text>
  <text x="52" y="90" style="font:500 14px sans-serif" fill="#0C447C">数据读取</text>
  <text x="52" y="112" style="font:400 11px sans-serif" fill="#0C447C" opacity="0.7">CSV/Excel → str</text>
  <text x="52" y="126" style="font:400 11px sans-serif" fill="#0C447C" opacity="0.7">Parquet 保留原生类型</text>

  <rect x="244" y="50" width="192" height="80" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="256" y="70" style="font:500 11px sans-serif" fill="#3C3489">Phase 1</text>
  <text x="256" y="90" style="font:500 14px sans-serif" fill="#3C3489">标准化</text>
  <text x="256" y="112" style="font:400 11px sans-serif" fill="#3C3489" opacity="0.7">snake_case (NFKC)</text>
  <text x="256" y="126" style="font:400 11px sans-serif" fill="#3C3489" opacity="0.7">幽灵字符剔除</text>

  <rect x="448" y="50" width="192" height="80" rx="10" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1"/>
  <text x="460" y="70" style="font:500 11px sans-serif" fill="#27500A">Phase 2</text>
  <text x="460" y="90" style="font:500 14px sans-serif" fill="#27500A">类型对齐</text>
  <text x="460" y="112" style="font:400 11px sans-serif" fill="#27500A" opacity="0.7">str → int/float/datetime</text>
  <text x="460" y="126" style="font:400 11px sans-serif" fill="#27500A" opacity="0.7">不合法值 → NaN</text>

  <line x1="340" y1="136" x2="340" y2="156" stroke="#888780" stroke-width="1.2" marker-end="url(#ar)"/>

  <rect x="40" y="162" width="192" height="80" rx="10" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="52" y="182" style="font:500 11px sans-serif" fill="#854F0B">Phase 3</text>
  <text x="52" y="202" style="font:500 14px sans-serif" fill="#854F0B">语义 &amp; 缺失处理</text>
  <text x="52" y="224" style="font:400 11px sans-serif" fill="#854F0B" opacity="0.7">invalid→NaN · sentinel→NaN</text>
  <text x="52" y="238" style="font:400 11px sans-serif" fill="#854F0B" opacity="0.7">median / mode 填补</text>

  <rect x="244" y="162" width="192" height="80" rx="10" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1"/>
  <text x="256" y="182" style="font:500 11px sans-serif" fill="#791F1F">Phase 4</text>
  <text x="256" y="202" style="font:500 14px sans-serif" fill="#791F1F">异常值压制</text>
  <text x="256" y="224" style="font:400 11px sans-serif" fill="#791F1F" opacity="0.7">iqr / percentile / zscore</text>
  <text x="256" y="238" style="font:400 11px sans-serif" fill="#791F1F" opacity="0.7">截断到围栏，不删行</text>

  <rect x="448" y="162" width="192" height="80" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="460" y="182" style="font:500 11px sans-serif" fill="#085041">Phase 5</text>
  <text x="460" y="202" style="font:500 14px sans-serif" fill="#085041">AI 语义输出</text>
  <text x="460" y="224" style="font:400 11px sans-serif" fill="#085041" opacity="0.7">summary · score</text>
  <text x="460" y="238" style="font:400 11px sans-serif" fill="#085041" opacity="0.7">insights · recommendations</text>
</svg>
