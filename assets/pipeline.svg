<svg viewBox="0 0 680 300" width="100%" xmlns="http://www.w3.org/2000/svg">
  <style>
    .ph{font:500 10px system-ui;letter-spacing:.05em}
    .tt{font:500 14px system-ui}
    .ds{font:400 11px system-ui;opacity:.7}
  </style>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 2L7 5L2 8" fill="none" stroke="#888780" stroke-width="1.2" stroke-linecap="round"/>
    </marker>
  </defs>

  <text x="340" y="30" text-anchor="middle" font:500 15px system-ui fill="#2C2C2A" style="font:500 15px system-ui">数据清洗管道架构</text>

  <!-- Row 1 -->
  <rect x="40" y="50" width="192" height="78" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text class="ph" x="52" y="68" fill="#0C447C">Phase 0</text>
  <text class="tt" x="52" y="87" fill="#0C447C">数据读取</text>
  <text class="ds" x="52" y="106" fill="#0C447C">CSV/Excel→str · Parquet原生类型</text>

  <rect x="244" y="50" width="192" height="78" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="ph" x="256" y="68" fill="#3C3489">Phase 1</text>
  <text class="tt" x="256" y="87" fill="#3C3489">标准化</text>
  <text class="ds" x="256" y="106" fill="#3C3489">snake_case · 幽灵字符剔除</text>

  <rect x="448" y="50" width="192" height="78" rx="10" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text class="ph" x="460" y="68" fill="#27500A">Phase 2</text>
  <text class="tt" x="460" y="87" fill="#27500A">类型对齐</text>
  <text class="ds" x="460" y="106" fill="#27500A">str→int/float/date · 非法→NaN</text>

  <!-- Row arrow -->
  <line x1="340" y1="134" x2="340" y2="154" stroke="#888780" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- Row 2 -->
  <rect x="40" y="160" width="192" height="78" rx="10" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text class="ph" x="52" y="178" fill="#854F0B">Phase 3</text>
  <text class="tt" x="52" y="197" fill="#854F0B">语义 &amp; 缺失处理</text>
  <text class="ds" x="52" y="216" fill="#854F0B">invalid→NaN · sentinel→NaN · 填补</text>

  <rect x="244" y="160" width="192" height="78" rx="10" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text class="ph" x="256" y="178" fill="#791F1F">Phase 4</text>
  <text class="tt" x="256" y="197" fill="#791F1F">异常值压制</text>
  <text class="ds" x="256" y="216" fill="#791F1F">iqr/percentile/zscore · 截断不删</text>

  <rect x="448" y="160" width="192" height="78" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="ph" x="460" y="178" fill="#085041">Phase 5</text>
  <text class="tt" x="460" y="197" fill="#085041">AI 语义输出</text>
  <text class="ds" x="460" y="216" fill="#085041">summary · score · insights</text>
</svg>
